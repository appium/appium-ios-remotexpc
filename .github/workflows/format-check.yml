name: Format Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v3
      - name: Use Node.js (LTS)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v3
        with:
          node-version: 'lts/*'
      - name: Install dependencies
        run: npm install

      - name: Check formatting
        # Run formatter in check mode (doesn't modify files)
        run: npm run format:check

      - name: Format instructions (if check fails)
        if: ${{ failure() }}
        run: |
          echo "::error::Formatting issues detected. Run 'npm run format' locally to fix."
